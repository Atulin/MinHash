name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write        # required by dorny/test-reporter
  pull-requests: write # required by dorny/test-reporter to post PR comments

jobs:
  test:
    name: Test (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: >
          dotnet test MinHash.Tests/MinHash.Tests.csproj
          --no-build -c Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory "${{ github.workspace }}/TestResults"

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true
